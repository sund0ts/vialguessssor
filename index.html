<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ВиллаГесс</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ── RESET & ROOT ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--bg2:#111115;--bg3:#18181f;--bg4:#1e1e28;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0f0f5;--muted:rgba(240,240,245,.45);
  --accent:#7c6aff;--accent2:#ff4f7a;--accent3:#00e5a0;
  --radius:14px;--radius-sm:9px;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* ── NAV ── */
#navbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;gap:8px;
  padding:0 28px;height:58px;
  background:rgba(10,10,12,.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-family:var(--font-d);font-weight:800;font-size:17px;letter-spacing:-.3px;color:var(--text);margin-right:auto;user-select:none;cursor:pointer}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:2px}
.nav-btn{background:none;border:none;color:var(--muted);font-family:var(--font-b);font-size:13.5px;font-weight:500;padding:6px 13px;border-radius:8px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px}
.nav-btn svg{width:14px;height:14px;flex-shrink:0}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-btn.active{color:var(--text);background:rgba(124,106,255,.14)}
.nav-auth{display:flex;gap:8px;margin-left:12px;align-items:center}

/* ── BUTTONS ── */
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--text);font-family:var(--font-b);font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border:none;color:#fff;font-family:var(--font-b);font-size:13px;font-weight:600;padding:8px 18px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s;box-shadow:0 0 22px rgba(124,106,255,.38);display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:#9083ff;transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,106,255,.5)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-danger{background:rgba(255,79,122,.12);border:1px solid rgba(255,79,122,.28);color:var(--accent2);font-family:var(--font-b);font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s}
.btn-danger:hover{background:rgba(255,79,122,.22)}
.btn-green{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.28);color:var(--accent3);font-family:var(--font-b);font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s}
.btn-green:hover{background:rgba(0,229,160,.2)}
.btn-sm{padding:5px 12px;font-size:12px}

/* ── MAIN ── */
#main{padding-top:58px;min-height:100vh}
.page{display:none}.page.active{display:block}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
#modal-overlay.hidden{display:none}
#modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:32px;width:430px;max-width:95vw;position:relative;box-shadow:0 28px 80px rgba(0,0,0,.65)}
#modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.06);border:none;color:var(--muted);font-size:16px;width:30px;height:30px;border-radius:50%;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center}
#modal-close:hover{background:rgba(255,255,255,.12);color:var(--text)}

/* ── FORMS ── */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-label{font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.form-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:14px;padding:10px 13px;border-radius:var(--radius-sm);outline:none;transition:border-color .18s;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
textarea.form-input{resize:vertical;min-height:80px}
select.form-input{cursor:pointer}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.45);animation:slideIn .22s ease;max-width:280px;display:flex;align-items:center;gap:10px}
.toast.success{border-left:3px solid var(--accent3)}
.toast.error{border-left:3px solid var(--accent2)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes slideIn{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── ROLE BADGES ── */
.role-badge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.07em}
.role-helper{background:rgba(91,200,245,.13);color:#5bc8f5;border:1px solid rgba(91,200,245,.28)}
.role-mod{background:rgba(58,123,213,.13);color:#3a7bd5;border:1px solid rgba(58,123,213,.28)}
.role-admin{background:rgba(26,86,219,.13);color:#5b8aff;border:1px solid rgba(26,86,219,.28)}
.role-curator{background:rgba(155,89,182,.13);color:#b97fe0;border:1px solid rgba(155,89,182,.28)}
.role-zga{background:rgba(168,224,99,.1);color:#a8e063;border:1px solid rgba(168,224,99,.28)}
.role-ga{background:rgba(39,174,96,.1);color:#2ecc71;border:1px solid rgba(39,174,96,.28)}
.role-coder{background:linear-gradient(90deg,rgba(255,79,122,.12),rgba(124,106,255,.12));border:1px solid rgba(255,79,122,.35);font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px;animation:rgbBorder 3s linear infinite}
.role-coder span{background:linear-gradient(90deg,#ff4f7a,#ff9f43,#7c6aff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@keyframes rgbBorder{0%{border-color:rgba(255,79,122,.5)}33%{border-color:rgba(124,106,255,.5)}66%{border-color:rgba(255,159,67,.5)}100%{border-color:rgba(255,79,122,.5)}}

/* ── ABOUT ── */
.about-hero{min-height:calc(100vh - 58px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;position:relative;overflow:hidden}
.about-hero::before{content:'';position:absolute;top:5%;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(ellipse,rgba(124,106,255,.07) 0%,transparent 68%);pointer-events:none}
.about-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border2);padding:6px 16px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
.about-title{font-family:var(--font-d);font-size:clamp(48px,8vw,106px);font-weight:800;line-height:.92;letter-spacing:-3px;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.45) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.about-title .accent{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.about-sub{font-size:17px;color:var(--muted);max-width:500px;line-height:1.75;margin-bottom:36px}
.about-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:70px}
.about-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:880px;width:100%}
.about-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:26px 22px;text-align:left;transition:border-color .2s,transform .2s}
.about-card:hover{border-color:var(--border2);transform:translateY(-3px)}
.about-card-icon{width:38px;height:38px;background:rgba(124,106,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.about-card-icon svg{width:20px;height:20px;color:var(--accent)}
.about-card-title{font-family:var(--font-d);font-size:15px;font-weight:700;margin-bottom:7px}
.about-card-text{font-size:13px;color:var(--muted);line-height:1.65}
.about-footer{margin-top:20px;color:var(--muted);font-size:12.5px}

/* ── GAME ── */
.game-wrap{padding:28px 32px;max-width:1200px;margin:0 auto}
.page-heading{font-family:var(--font-d);font-size:30px;font-weight:800;letter-spacing:-.5px}
.page-sub{color:var(--muted);font-size:13.5px;margin-top:3px}
.game-start-card{max-width:460px;margin:32px auto 0;text-align:center;padding:44px 36px}
.game-start-icon{width:64px;height:64px;background:rgba(124,106,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.game-start-icon svg{width:32px;height:32px;color:var(--accent)}
.round-options{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.round-opt{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:var(--font-b);font-size:13px;padding:8px 20px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s}
.round-opt.sel{background:rgba(124,106,255,.15);border-color:var(--accent);color:var(--text)}
.game-active{padding:20px 32px}
.game-topbar{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.round-label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.round-score{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--accent)}
.progress-bar{height:3px;background:var(--bg3);border-radius:99px;margin-bottom:18px}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
.game-layout{display:grid;grid-template-columns:1fr 330px;gap:18px}
#map-photo{width:100%;height:480px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center}
#map-photo img{width:100%;height:100%;object-fit:cover}
.no-photo-msg{color:var(--muted);font-size:13px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.no-photo-msg svg{width:40px;height:40px;opacity:.35}
.game-sidebar{display:flex;flex-direction:column;gap:12px}
.guess-map-wrap{width:100%;height:240px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.guess-coords{font-size:12px;color:var(--muted);margin-top:8px;min-height:18px}
.hint-text{font-size:12.5px;color:var(--muted);padding:8px 10px;background:var(--bg3);border-radius:var(--radius-sm);display:none}
.game-result-screen{padding:28px 32px;max-width:540px;margin:0 auto}
.suggest-section{margin-top:28px;padding:0 32px 32px}

/* ── FORUM ── */
.forum-wrap{display:grid;grid-template-columns:230px 1fr;min-height:calc(100vh - 58px)}
.forum-sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:22px 14px}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding:0 8px}
.cat-btn{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--muted);font-family:var(--font-b);font-size:13.5px;padding:9px 11px;border-radius:var(--radius-sm);cursor:pointer;text-align:left;transition:all .15s;margin-bottom:2px}
.cat-btn:hover{background:rgba(255,255,255,.05);color:var(--text)}
.cat-btn.active{background:rgba(124,106,255,.12);color:var(--text)}
.cat-btn svg{width:15px;height:15px;flex-shrink:0;opacity:.6}
.forum-main{padding:26px 30px}
.forum-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}
.forum-h{font-family:var(--font-d);font-size:22px;font-weight:800}
.thread-list{display:flex;flex-direction:column;gap:8px}
.thread-item{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;transition:all .15s}
.thread-item:hover{border-color:var(--border2);background:var(--bg3)}
.t-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.t-avatar svg{width:18px;height:18px;color:var(--muted)}
.t-info{flex:1;min-width:0}
.t-title{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-meta{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.t-stats{display:flex;gap:14px;flex-shrink:0;font-size:12px;color:var(--muted)}
.t-stat{display:flex;align-items:center;gap:5px}
.t-stat svg{width:13px;height:13px}
.post-list{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.post-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;display:grid;grid-template-columns:148px 1fr;gap:18px}
.post-author{border-right:1px solid var(--border);padding-right:18px}
.post-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.post-av svg{width:22px;height:22px;color:#fff}
.post-uname{font-weight:600;font-size:13.5px;margin-bottom:5px}
.post-body{font-size:13.5px;line-height:1.72;color:rgba(240,240,245,.85);word-break:break-word}
.post-date{font-size:11px;color:var(--muted);margin-top:10px}
.reply-box{margin-top:18px}

/* ── TOP ── */
.top-wrap{padding:40px 32px;max-width:860px;margin:0 auto}
.top-head{text-align:center;margin-bottom:36px}
.top-h{font-family:var(--font-d);font-size:46px;font-weight:800;letter-spacing:-2px}
.top-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
.top-tab{background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-family:var(--font-b);font-size:13px;font-weight:500;padding:8px 20px;border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px}
.top-tab svg{width:14px;height:14px}
.top-tab.active{background:rgba(124,106,255,.14);border-color:var(--accent);color:var(--text)}
.top-list{display:flex;flex-direction:column;gap:8px}
.top-item{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:13px 18px;transition:all .15s}
.top-item:hover{border-color:var(--border2)}
.top-item.r1{background:linear-gradient(90deg,rgba(255,215,0,.05),var(--bg2));border-color:rgba(255,215,0,.22)}
.top-item.r2{background:linear-gradient(90deg,rgba(192,192,192,.05),var(--bg2));border-color:rgba(192,192,192,.18)}
.top-item.r3{background:linear-gradient(90deg,rgba(205,127,50,.05),var(--bg2));border-color:rgba(205,127,50,.18)}
.top-rank{font-family:var(--font-d);font-size:17px;font-weight:800;width:32px;text-align:center;color:var(--muted)}
.top-rank.gold{color:#ffd700}.top-rank.silver{color:#c0c0c0}.top-rank.bronze{color:#cd7f32}
.top-av{width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center}
.top-av svg{width:18px;height:18px;color:var(--muted)}
.top-name{flex:1;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.top-sc{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--accent)}
.top-gm{font-size:11.5px;color:var(--muted)}

/* ── PROFILE ── */
.profile-wrap{padding:36px 32px;max-width:840px;margin:0 auto}
.profile-header-card{display:flex;gap:22px;align-items:flex-start;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:26px;margin-bottom:20px}
.p-avatar{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.p-avatar svg{width:36px;height:36px;color:#fff}
.p-info{flex:1}
.p-name{font-family:var(--font-d);font-size:24px;font-weight:800;margin-bottom:5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.p-email{font-size:12.5px;color:var(--muted)}
.p-stats{display:flex;gap:22px;margin-top:14px}
.p-stat-val{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--accent)}
.p-stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.profile-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.card-title{font-family:var(--font-d);font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title svg{width:16px;height:16px;color:var(--accent)}
.admin-title{font-size:14px;font-weight:700;color:var(--accent2);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.admin-title svg{width:15px;height:15px}
.pending-item{background:var(--bg3);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.pending-info{flex:1}
.pending-name{font-size:13.5px;font-weight:500}
.pending-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
.pending-actions{display:flex;gap:7px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:7px}
.emoji-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;font-size:19px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.emoji-btn:hover{border-color:var(--border2)}
.emoji-btn.active{border-color:var(--accent);background:rgba(124,106,255,.1)}

/* ── UTILITY ── */
.hidden{display:none!important}
.sep{border:none;border-top:1px solid var(--border);margin:14px 0}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.text-muted{color:var(--muted)}.text-sm{font-size:12.5px}.text-center{text-align:center}
.flex{display:flex}.items-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}.flex-wrap{flex-wrap:wrap}
.empty-state{text-align:center;padding:52px 0;color:var(--muted)}
.empty-state svg{width:44px;height:44px;margin-bottom:12px;opacity:.3}
.w-full{width:100%}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .about-cards{grid-template-columns:1fr}
  .game-layout{grid-template-columns:1fr}
  .forum-wrap{grid-template-columns:1fr}
  .forum-sidebar{display:none}
  .profile-grid{grid-template-columns:1fr}
  .top-h{font-size:36px}
}
@media(max-width:600px){
  #navbar{padding:0 14px}
  .nav-links .nav-btn span{display:none}
}

/* ── LEAFLET DARK FIX ── */
.leaflet-container{background:#1a1a26!important}
</style>
</head>
<body>
<div id="app">
  <nav id="navbar">
    <div class="nav-logo" onclick="showPage('about')">ВИЛЛА<span>ГЕСС</span></div>

async function doLogin() {
  const email = v('li-email'), pass = v('li-pass');
  if(!email||!pass) return toast('Заполни все поля','error');
  const { error } = await sb.auth.signInWithPassword({email,password:pass});
  if(error) return toast(error.message,'error');
  closeModal(); toast('Добро пожаловать!','success');
}

async function doRegister() {
  const uname = v('rg-name'), email = v('rg-email'), pass = v('rg-pass');
  if(!uname||!email||!pass) return toast('Заполни все поля','error');
  if(pass.length<8) return toast('Пароль минимум 8 символов','error');

  // Check username not taken
  const { data: existing } = await sb.from('profiles').select('id').eq('username', uname).maybeSingle();
  if(existing) return toast('Никнейм уже занят','error');

  const siteUrl = window.location.origin + window.location.pathname;
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: {
      emailRedirectTo: siteUrl,
      data: { username: uname }
    }
  });
  if(error) return toast(error.message,'error');

  // Create profile — works with or without email confirmation
  const uid = data?.user?.id;
  if(uid) {
    const { error: pe } = await sb.from('profiles').upsert({
      id: uid, username: uname, role: 'user',
      avatar_emoji: '🎮', total_score: 0, best_score: 0, games_played: 0
    }, { onConflict: 'id' });
    if(pe) console.warn('Profile upsert error:', pe.message);
  }

  closeModal();
  if(data?.session) {
    curUser = data.session.user;
    await fetchProfile(curUser.id);
    updateNavAuth();
    toast('Добро пожаловать, ' + uname + '!', 'success');
  } else {
    toast('Аккаунт создан! Проверь email и перейди по ссылке.', 'info');
  }
}

async function doLogout() {
  await sb.auth.signOut(); curUser=null; curProfile=null;
  updateNavAuth(); showPage('about'); toast('Вышел из аккаунта','info');
}

  const { data } = await sb.from('game_points').select('*').eq('approved',true);
  if(!data||data.length < G.total) return toast('Недостаточно точек в базе данных','error');
  G.pts = data.sort(()=>Math.random()-.5).slice(0,G.total);
  G.round=1; G.score=0; G.results=[]; G.guess=null; G.marker=null;
  document.getElementById('gs-start').style.display='none';
  document.getElementById('gs-active').style.display='block';
  await initGuessMap(); loadRound();
}

async function initGuessMap() {
  if(G.gmap){G.gmap.remove();G.gmap=null;}
  G.gmap = L.map('guess-map-div',{center:GAME_CENTER,zoom:14,zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(G.gmap);
  const bounds = L.latLngBounds(GAME_BOUNDS[0],GAME_BOUNDS[1]);
  G.gmap.setMaxBounds(bounds.pad(.4));
  G.gmap.on('click',e=>{
    G.guess=e.latlng;
    if(G.marker)G.marker.remove();
    G.marker=L.marker(e.latlng,{icon:L.divIcon({html:'<div style="width:14px;height:14px;background:var(--accent);border:2px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(124,106,255,.9)"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''})}).addTo(G.gmap);
    document.getElementById('g-coords').textContent=`${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
    document.getElementById('g-confirm').disabled=false;
  });
}

function loadRound() {
  G.cur = G.pts[G.round-1]; G.guess=null;
  if(G.marker){G.marker.remove();G.marker=null;}
  document.getElementById('g-confirm').disabled=true;
  document.getElementById('g-coords').textContent='Нажми на карту ↑';
  document.getElementById('g-round').textContent=G.round;
  document.getElementById('g-total').textContent=G.total;
  document.getElementById('g-score').textContent=G.score+' pts';
  document.getElementById('g-progress').style.width=((G.round-1)/G.total*100)+'%';
  const ph = document.getElementById('map-photo');
  if(G.cur.photo_url) ph.innerHTML=`<img src="${G.cur.photo_url}" alt="point"/>`;
  else ph.innerHTML=`<div class="no-photo-msg">${SVG.camera}<span>Фото не добавлено</span><span class="text-sm">${esc(G.cur.name)}</span></div>`;
  const hb = document.getElementById('hint-box');
  if(G.cur.hint){hb.textContent='💡 '+G.cur.hint;hb.style.display='block';}
  else hb.style.display='none';
}

function confirmGuess() {
  if(!G.guess) return;
  const actual = L.latLng(G.cur.lat, G.cur.lng);
  const dist = Math.round(actual.distanceTo(G.guess));
  const pts = Math.max(0, Math.round(5000 - dist*10));
  G.score += pts; G.results.push({round:G.round,dist,score:pts});
  L.marker([actual.lat,actual.lng],{icon:L.divIcon({html:'<div style="width:14px;height:14px;background:#ff4f7a;border:2px solid #fff;border-radius:50%"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''})}).addTo(G.gmap);
  L.polyline([G.guess,actual],{color:'#7c6aff',weight:2,dashArray:'5'}).addTo(G.gmap);
  document.getElementById('g-confirm').disabled=true;
  document.getElementById('g-score').textContent=G.score+' pts';
  const emoji = dist<50?'🎯':dist<200?'🔥':dist<500?'👌':'😬';
  openModal(`
    <div style="text-align:center">
      <div style="font-size:52px;margin-bottom:10px">${emoji}</div>
      <h2 style="font-family:var(--font-d);font-size:28px;font-weight:800;margin-bottom:4px">+${pts} очков</h2>
      <p class="text-muted" style="margin-bottom:24px">${dist<50?'Точное попадание!':dist<200?'Отлично!':dist<500?'Неплохо':'Промах'} · ${dist} м от цели</p>
      <button class="btn-primary w-full" style="padding:12px" onclick="nextRound()">${G.round<G.total?'Следующий раунд →':'Результаты'}</button>
    </div>
  `);
}

function nextRound() {
  closeModal();
  if(G.round>=G.total){showFinalResults();return;}
  G.round++; loadRound();
}

async function showFinalResults() {
  document.getElementById('gs-active').style.display='none';
  if(curUser && curProfile) {
    await sb.from('game_scores').insert({user_id:curUser.id,score:G.score,rounds:G.total,created_at:new Date().toISOString()});
    const newTotal=(curProfile.total_score||0)+G.score, newGames=(curProfile.games_played||0)+1, newBest=Math.max(curProfile.best_score||0,G.score);
    await sb.from('profiles').update({total_score:newTotal,games_played:newGames,best_score:newBest}).eq('id',curUser.id);
    curProfile={...curProfile,total_score:newTotal,games_played:newGames,best_score:newBest};

  document.getElementById('gs-result').innerHTML=`

      <div class="card" style="text-align:center;padding:40px 32px">
        <div style="width:64px;height:64px;background:rgba(124,106,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">${SVG.trophy}</div>

        <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;margin-bottom:22px;text-align:left">
          ${G.results.map(r=>`
            <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
              <span class="text-muted">Раунд ${r.round}</span><span>${r.dist} м</span><span style="color:var(--accent);font-weight:600">+${r.score}</span>

async function loadTop() {
  const {data}=await sb.from('profiles').select('id,username,role,best_score,total_score,games_played').not('games_played','eq',0).order('best_score',{ascending:false}).limit(50);

  let list=[...data];
  if(topMode==='avg') list.sort((a,b)=>((b.total_score||0)/(b.games_played||1))-((a.total_score||0)/(a.games_played||1)));
  else if(topMode==='games') list.sort((a,b)=>(b.games_played||0)-(a.games_played||0));
  const rk=(i)=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const rkn=(i)=>i===0?'🥇':i===1?'🥈':i===2?'🥉':String(i+1);
  const sc=(p)=>topMode==='avg'?Math.round((p.total_score||0)/(p.games_played||1))+' avg':topMode==='games'?p.games_played+' игр':(p.best_score||0)+' pts';
  el.innerHTML=`<div class="top-list">`+list.map((p,i)=>`
    <div class="top-item ${i<3?'r'+(i+1):''}">
      <div class="top-rank ${rk(i)}">${rkn(i)}</div>
      <div class="top-av">${SVG.user}</div>
      <div class="top-name">${esc(p.username)} ${roleBadge(p.role)}</div>
      <div style="text-align:right">
        <div class="top-sc">${sc(p)}</div>
        <div class="top-gm">${p.games_played} игр</div>
      </div>
    </div>`).join('')+`</div>`;
}

        </div>
        <div class="card">
          <div class="card-title">${SVG.user} Аватар</div>
          <div class="emoji-grid">
            ${'🎮 🏠 🌲 🐾 ⭐ 🔥 🎯 🦁 🐺 🌙 💎 🎪'.split(' ').map(e=>`<button class="emoji-btn ${p.avatar_emoji===e?'active':''}" onclick="setEmoji('${e}')">${e}</button>`).join('')}
          </div>
        </div>
      </div>
      ${canRoles(p.role)?renderRolePanel():''}
      ${canApprove(p.role)?renderAdminPanelHTML():''}
    </div>`;
  loadRecentGames();
  if(canApprove(p.role))loadAdminPending();
}

function renderRolePanel() {
  return `<div class="mt-24"><div class="card">
    <div class="admin-title">${SVG.shield} Управление ролями</div>
    <div style="display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end">
      <div class="form-group" style="margin-bottom:0"><label class="form-label">Никнейм</label><input class="form-input" id="r-user" placeholder="username"/></div>
      <div class="form-group" style="margin-bottom:0"><label class="form-label">Роль</label><select class="form-input" id="r-role">
        ${Object.entries(ROLES).filter(([k])=>k!=='coder').map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('')}
      </select></div>
      <button class="btn-primary" onclick="assignRole()">Выдать</button>
    </div>
  </div></div>`;
}

function renderAdminPanelHTML() {
  return `<div class="mt-16"><div class="card">
    <div class="admin-title">${SVG.map} Точки на проверке</div>
    <div id="p-pending">Загрузка...</div>
  </div></div>`;
}

async function loadRecentGames() {
  const {data}=await sb.from('game_scores').select('*').eq('user_id',curUser.id).order('created_at',{ascending:false}).limit(5);
  const el=document.getElementById('p-games'); if(!el)return;
  if(!data||!data.length){el.innerHTML='<p class="text-muted text-sm">Нет сыгранных игр</p>';return;}
  el.innerHTML=data.map(g=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
    <span class="text-muted">${new Date(g.created_at).toLocaleDateString('ru-RU')}</span>
    <span>${g.rounds} ран.</span>
    <span style="color:var(--accent);font-weight:600">${g.score} pts</span>
  </div>`).join('');
}

async function loadAdminPending() {
  const {data}=await sb.from('game_points').select('*,profiles(username)').eq('approved',false);
  const el=document.getElementById('p-pending'); if(!el)return;
  if(!data||!data.length){el.innerHTML='<p class="text-muted text-sm">Нет точек на проверке ✅</p>';return;}
  el.innerHTML=data.map(p=>`<div class="pending-item">
    <div class="pending-info"><div class="pending-name">${esc(p.name)}</div><div class="pending-meta">${p.lat}, ${p.lng} · ${p.profiles?.username||'?'}${p.hint?' · '+p.hint:''}</div></div>
    <div class="pending-actions">
      <button class="btn-green btn-sm" onclick="approvePointP('${p.id}')">${SVG.check}</button>
      <button class="btn-danger btn-sm" onclick="rejectPointP('${p.id}')">${SVG.x}</button>
    </div>
  </div>`).join('');
}

async function approvePointP(id){await sb.from('game_points').update({approved:true}).eq('id',id);toast('Принята','success');loadAdminPending();}
async function rejectPointP(id){await sb.from('game_points').delete().eq('id',id);toast('Удалена','info');loadAdminPending();}

async function assignRole() {
  const uname=v('r-user'),role=v('r-role'); if(!uname)return toast('Введи никнейм','error');
  const {data:target}=await sb.from('profiles').select('id,role').eq('username',uname).single();
  if(!target)return toast('Пользователь не найден','error');
  const myLvl=ROLES[curProfile.role]?.level||0, tgtLvl=ROLES[target.role]?.level||0, newLvl=ROLES[role]?.level||0;
  if(curProfile.role!=='coder'&&newLvl>=myLvl)return toast('Нельзя выдать роль ≥ своей','error');
  if(curProfile.role!=='coder'&&tgtLvl>=myLvl)return toast('Нельзя изменить роль равного','error');
  await sb.from('profiles').update({role}).eq('id',target.id);
  toast(`Роль ${ROLES[role].label} выдана ${uname}`,'success');
}

async function setEmoji(e) {
  await sb.from('profiles').update({avatar_emoji:e}).eq('id',curUser.id);
  curProfile.avatar_emoji=e; toast('Аватар обновлён','success'); renderProfile();
}

function openEditProfile() {
  openModal(`
    <h2 style="font-family:var(--font-d);font-size:20px;font-weight:800;margin-bottom:18px">Редактировать профиль</h2>
    <div class="form-group"><label class="form-label">Никнейм</label><input class="form-input" id="ep-name" value="${esc(curProfile.username||'')}"/></div>
    <button class="btn-primary w-full" style="margin-top:4px" onclick="saveProfile()">Сохранить</button>
  `);
}

async function saveProfile() {
  const uname=v('ep-name'); if(!uname)return toast('Никнейм не может быть пустым','error');
  const {error}=await sb.from('profiles').update({username:uname}).eq('id',curUser.id);
  if(error)return toast('Ошибка: '+error.message,'error');
  curProfile.username=uname; closeModal(); updateNavAuth(); renderProfile(); toast('Профиль обновлён','success');
}

// =============================================
// CORE: ROUTING / MODAL / TOAST / UTILS
// =============================================
let curPage='about';
const PAGES={about:renderAbout,game:renderGame,forum:renderForum,top:renderTop,profile:renderProfile};

function showPage(name) {
  if(!PAGES[name])return;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name)?.classList.add('active');
  document.querySelector(`.nav-btn[data-page="${name}"]`)?.classList.add('active');
  curPage=name; PAGES[name](); window.scrollTo(0,0);
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-content').innerHTML='';
}

function toast(msg,type='info') {
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  const icons={success:SVG.check,error:SVG.x,info:SVG.star};
  el.innerHTML=`<span style="flex-shrink:0;opacity:.7;display:flex">${icons[type]||''}</span><span>${msg}</span>`;
  el.querySelector('svg').style.cssText='width:14px;height:14px';
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function v(id){const el=document.getElementById(id);return el?(el.value||'').trim():'';}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(iso){
  if(!iso)return '';
  const d=new Date(iso),diff=(Date.now()-d)/1000;
  if(diff<60)return 'только что';
  if(diff<3600)return Math.floor(diff/60)+' мин назад';
  if(diff<86400)return Math.floor(diff/3600)+' ч назад';
  return d.toLocaleDateString('ru-RU');
}

// close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});

// nav buttons
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>showPage(btn.dataset.page));
});

// ── BOOT ──
(async()=>{ await initAuth(); showPage('about'); })();
</script>
</body>
</html>
