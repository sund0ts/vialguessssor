<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ВиллаГесс</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ── RESET & ROOT ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0c;--bg2:#111115;--bg3:#18181f;--bg4:#1e1e28;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f0f0f5;--muted:rgba(240,240,245,.45);
  --accent:#7c6aff;--accent2:#ff4f7a;--accent3:#00e5a0;
  --radius:14px;--radius-sm:9px;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.6;min-height:100vh;overflow-x:hidden}

/* ── NAV ── */
#navbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;gap:8px;
  padding:0 28px;height:58px;
  background:rgba(10,10,12,.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-logo{font-family:var(--font-d);font-weight:800;font-size:17px;letter-spacing:-.3px;color:var(--text);margin-right:auto;user-select:none;cursor:pointer}
.nav-logo span{color:var(--accent)}
.nav-links{display:flex;gap:2px}
.nav-btn{background:none;border:none;color:var(--muted);font-family:var(--font-b);font-size:13.5px;font-weight:500;padding:6px 13px;border-radius:8px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:6px}
.nav-btn svg{width:14px;height:14px;flex-shrink:0}
.nav-btn:hover{color:var(--text);background:rgba(255,255,255,.06)}
.nav-btn.active{color:var(--text);background:rgba(124,106,255,.14)}
.nav-auth{display:flex;gap:8px;margin-left:12px;align-items:center}

/* ── BUTTONS ── */
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--text);font-family:var(--font-b);font-size:13px;font-weight:500;padding:7px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:6px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-primary{background:var(--accent);border:none;color:#fff;font-family:var(--font-b);font-size:13px;font-weight:600;padding:8px 18px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s;box-shadow:0 0 22px rgba(124,106,255,.38);display:inline-flex;align-items:center;gap:6px}
.btn-primary:hover{background:#9083ff;transform:translateY(-1px);box-shadow:0 6px 28px rgba(124,106,255,.5)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-danger{background:rgba(255,79,122,.12);border:1px solid rgba(255,79,122,.28);color:var(--accent2);font-family:var(--font-b);font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s}
.btn-danger:hover{background:rgba(255,79,122,.22)}
.btn-green{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.28);color:var(--accent3);font-family:var(--font-b);font-size:12px;font-weight:600;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s}
.btn-green:hover{background:rgba(0,229,160,.2)}
.btn-sm{padding:5px 12px;font-size:12px}

/* ── MAIN ── */
#main{padding-top:58px;min-height:100vh}
.page{display:none}.page.active{display:block}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center}
#modal-overlay.hidden{display:none}
#modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:18px;padding:32px;width:430px;max-width:95vw;position:relative;box-shadow:0 28px 80px rgba(0,0,0,.65)}
#modal-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.06);border:none;color:var(--muted);font-size:16px;width:30px;height:30px;border-radius:50%;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center}
#modal-close:hover{background:rgba(255,255,255,.12);color:var(--text)}

/* ── FORMS ── */
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.form-label{font-size:11.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.form-input{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-b);font-size:14px;padding:10px 13px;border-radius:var(--radius-sm);outline:none;transition:border-color .18s;width:100%}
.form-input:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--muted)}
textarea.form-input{resize:vertical;min-height:80px}
select.form-input{cursor:pointer}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.45);animation:slideIn .22s ease;max-width:280px;display:flex;align-items:center;gap:10px}
.toast.success{border-left:3px solid var(--accent3)}
.toast.error{border-left:3px solid var(--accent2)}
.toast.info{border-left:3px solid var(--accent)}
@keyframes slideIn{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── ROLE BADGES — banner style ── */
.role-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:800;
  padding:3px 10px 3px 8px;
  border-radius:6px;
  text-transform:uppercase;letter-spacing:.08em;
  position:relative;overflow:hidden;
  white-space:nowrap;flex-shrink:0;
}
.role-badge::before{
  content:'';position:absolute;inset:0;
  background:inherit;filter:brightness(1.15);
  opacity:0;transition:opacity .2s;
}
.role-badge:hover::before{opacity:1}
/* shield icon shared */
.role-badge svg{width:11px;height:11px;flex-shrink:0}

.role-helper{
  background:linear-gradient(135deg,#1a4a5a,#0d3040);
  color:#5bc8f5;border:1px solid rgba(91,200,245,.35);
  box-shadow:0 2px 8px rgba(91,200,245,.15);
}
.role-mod{
  background:linear-gradient(135deg,#1a2e50,#0f1e38);
  color:#6ba3f5;border:1px solid rgba(58,123,213,.4);
  box-shadow:0 2px 8px rgba(58,123,213,.18);
}
.role-admin{
  background:linear-gradient(135deg,#15255e,#0a1540);
  color:#7b9fff;border:1px solid rgba(26,86,219,.45);
  box-shadow:0 2px 8px rgba(26,86,219,.22);
}
.role-curator{
  background:linear-gradient(135deg,#2d1a4a,#1a0f30);
  color:#c98ff0;border:1px solid rgba(155,89,182,.4);
  box-shadow:0 2px 8px rgba(155,89,182,.2);
}
.role-zga{
  background:linear-gradient(135deg,#1e3510,#122008);
  color:#a8e063;border:1px solid rgba(168,224,99,.35);
  box-shadow:0 2px 8px rgba(168,224,99,.15);
}
.role-ga{
  background:linear-gradient(135deg,#0d2e1a,#071a0e);
  color:#2ecc71;border:1px solid rgba(39,174,96,.38);
  box-shadow:0 2px 8px rgba(39,174,96,.18);
}
.role-coder{
  padding:3px 10px 3px 8px;
  border-radius:6px;
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:.08em;
  background:linear-gradient(135deg,#2a0a18,#180820);
  border:1px solid rgba(255,79,122,.4);
  box-shadow:0 2px 12px rgba(124,106,255,.25);
  animation:coderGlow 2.5s ease-in-out infinite;
  display:inline-flex;align-items:center;gap:5px;
  position:relative;overflow:hidden;white-space:nowrap;flex-shrink:0;
}
.role-coder span{
  background:linear-gradient(90deg,#ff4f7a,#ff9f43,#ffe043,#7c6aff,#ff4f7a);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  animation:rgbSlide 2.5s linear infinite;
}
.role-coder svg{color:#ff4f7a;width:11px;height:11px;flex-shrink:0}
@keyframes coderGlow{
  0%,100%{box-shadow:0 2px 12px rgba(255,79,122,.25),0 0 0 0 rgba(124,106,255,0)}
  50%{box-shadow:0 2px 20px rgba(124,106,255,.4),0 0 12px rgba(255,79,122,.15)}
}
@keyframes rgbSlide{from{background-position:0% center}to{background-position:200% center}}

/* post author badge — bigger version */
.post-author .role-badge{font-size:11px;padding:4px 11px 4px 9px}

/* ── ABOUT ── */
.about-hero{min-height:calc(100vh - 58px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 24px;position:relative;overflow:hidden}
.about-hero::before{content:'';position:absolute;top:5%;left:50%;transform:translateX(-50%);width:700px;height:700px;background:radial-gradient(ellipse,rgba(124,106,255,.07) 0%,transparent 68%);pointer-events:none}
.about-pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border2);padding:6px 16px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
.about-title{font-family:var(--font-d);font-size:clamp(48px,8vw,106px);font-weight:800;line-height:.92;letter-spacing:-3px;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.45) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.about-title .accent{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.about-sub{font-size:17px;color:var(--muted);max-width:500px;line-height:1.75;margin-bottom:36px}
.about-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:70px}
.about-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:880px;width:100%}
.about-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:26px 22px;text-align:left;transition:border-color .2s,transform .2s}
.about-card:hover{border-color:var(--border2);transform:translateY(-3px)}
.about-card-icon{width:38px;height:38px;background:rgba(124,106,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.about-card-icon svg{width:20px;height:20px;color:var(--accent)}
.about-card-title{font-family:var(--font-d);font-size:15px;font-weight:700;margin-bottom:7px}
.about-card-text{font-size:13px;color:var(--muted);line-height:1.65}
.about-footer{margin-top:20px;color:var(--muted);font-size:12.5px}

/* ── GAME ── */
.game-wrap{padding:28px 32px;max-width:1200px;margin:0 auto}
.page-heading{font-family:var(--font-d);font-size:30px;font-weight:800;letter-spacing:-.5px}
.page-sub{color:var(--muted);font-size:13.5px;margin-top:3px}
.game-start-card{max-width:460px;margin:32px auto 0;text-align:center;padding:44px 36px}
.game-start-icon{width:64px;height:64px;background:rgba(124,106,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.game-start-icon svg{width:32px;height:32px;color:var(--accent)}
.round-options{display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.round-opt{background:var(--bg3);border:1px solid var(--border);color:var(--muted);font-family:var(--font-b);font-size:13px;padding:8px 20px;border-radius:var(--radius-sm);cursor:pointer;transition:all .18s}
.round-opt.sel{background:rgba(124,106,255,.15);border-color:var(--accent);color:var(--text)}
.game-active{padding:20px 32px}
.game-topbar{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.round-label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.round-score{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--accent)}
.progress-bar{height:3px;background:var(--bg3);border-radius:99px;margin-bottom:18px}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .4s ease}
.game-layout{display:grid;grid-template-columns:1fr 330px;gap:18px}
#map-photo{width:100%;height:480px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center}
#map-photo img{width:100%;height:100%;object-fit:cover}
.no-photo-msg{color:var(--muted);font-size:13px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px}
.no-photo-msg svg{width:40px;height:40px;opacity:.35}
.game-sidebar{display:flex;flex-direction:column;gap:12px}
.guess-map-wrap{width:100%;height:240px;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border)}
.guess-coords{font-size:12px;color:var(--muted);margin-top:8px;min-height:18px}
.hint-text{font-size:12.5px;color:var(--muted);padding:8px 10px;background:var(--bg3);border-radius:var(--radius-sm);display:none}
.game-result-screen{padding:28px 32px;max-width:540px;margin:0 auto}
.suggest-section{margin-top:28px;padding:0 32px 32px}

/* ── FORUM ── */
.forum-page{max-width:1100px;margin:0 auto;padding:24px 24px 40px}
.forum-section{margin-bottom:28px}
.forum-section-title{
  font-family:var(--font-d);font-size:13px;font-weight:700;
  color:var(--muted);letter-spacing:.06em;text-transform:uppercase;
  padding:0 4px;margin-bottom:8px;
}
.forum-cats-block{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;
}
/* Category row */
.fcat-row{
  display:grid;grid-template-columns:auto 1fr auto auto;
  align-items:center;gap:14px;
  padding:14px 18px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.fcat-row:last-child{border-bottom:none}
.fcat-row:hover{background:rgba(255,255,255,.03)}
.fcat-row.fcat-active{background:rgba(124,106,255,.06)}
.fcat-icon{
  width:38px;height:38px;border-radius:10px;
  background:rgba(124,106,255,.1);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.fcat-icon svg{width:18px;height:18px;color:var(--accent)}
.fcat-info{min-width:0}
.fcat-name{font-weight:600;font-size:14.5px;color:var(--text)}
.fcat-desc{font-size:12px;color:var(--muted);margin-top:2px}
.fcat-count{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:5px;white-space:nowrap}
.fcat-count svg{width:13px;height:13px}
.fcat-last{text-align:right;min-width:160px;flex-shrink:0}
.fcat-last-title{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.fcat-last-meta{font-size:11px;color:var(--muted);margin-top:2px}
/* Thread list (inside category) */
.forum-thread-page{max-width:1100px;margin:0 auto;padding:20px 24px 40px}
.forum-topbar2{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.forum-breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}
.forum-breadcrumb span{color:var(--text);font-weight:500}
.forum-breadcrumb-sep{opacity:.4}
.thread-table{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.thread-table-head{
  display:grid;grid-template-columns:1fr 80px 80px 200px;
  padding:9px 16px;border-bottom:1px solid var(--border);
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.06em;color:var(--muted);
}
.thread-row{
  display:grid;grid-template-columns:1fr 80px 80px 200px;
  align-items:center;gap:0;
  padding:12px 16px;border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.thread-row:last-child{border-bottom:none}
.thread-row:hover{background:rgba(255,255,255,.025)}
.thread-row.is-pinned{background:linear-gradient(90deg,rgba(255,215,0,.03),transparent)}
.thread-row.is-closed .tr-title-text{color:var(--muted)}
.tr-left{min-width:0;padding-right:12px}
.tr-title-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.tr-title-text{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr-meta{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
.tr-num{font-size:13px;color:var(--muted);text-align:center;padding:0 4px}
.tr-last{padding-left:12px;border-left:1px solid var(--border)}
.tr-last-title{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.tr-last-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.tr-last-av{width:18px;height:18px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.tr-last-av svg{width:11px;height:11px;color:var(--muted)}
.tr-last-av img{width:100%;height:100%;object-fit:cover}
.post-list{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.post-item{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  display:grid;grid-template-columns:160px 1fr;
  transition:border-color .18s;
}
.post-item:hover{border-color:var(--border2)}
.post-author{
  padding:18px 16px;
  background:rgba(255,255,255,.025);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  text-align:center;gap:0;
}
.post-av{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;flex-shrink:0;
  box-shadow:0 4px 14px rgba(124,106,255,.35);
}
.post-av svg{width:22px;height:22px;color:#fff}
.post-uname{font-weight:700;font-size:13px;margin-bottom:7px;word-break:break-word}
.post-content{padding:16px 18px;display:flex;flex-direction:column;justify-content:space-between}
.post-body{font-size:14px;line-height:1.75;color:rgba(240,240,245,.88);word-break:break-word;white-space:pre-wrap}
.post-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.post-date{font-size:11px;color:var(--muted)}
.reply-box{margin-top:18px}
/* ── THREAD BADGES ── */
.thread-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.badge-pinned{background:rgba(255,215,0,.12);color:#ffd700;border:1px solid rgba(255,215,0,.3)}
.badge-closed{background:rgba(255,79,122,.1);color:#ff4f7a;border:1px solid rgba(255,79,122,.25)}
.badge-prefix{border-radius:5px;font-size:10px;font-weight:700;padding:2px 8px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.thread-item.is-pinned{border-color:rgba(255,215,0,.2);background:linear-gradient(90deg,rgba(255,215,0,.03),var(--bg2))}
.thread-item.is-closed{opacity:.7}
.thread-item.is-closed .t-title{color:var(--muted)}
.thread-actions{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  margin-bottom:14px;padding:8px 12px;
  background:var(--bg2);border-radius:var(--radius-sm);
  border:1px solid var(--border);
}
.mod-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:1px solid var(--border);
  color:var(--muted);font-family:var(--font-b);
  font-size:11.5px;font-weight:500;
  padding:5px 11px;border-radius:7px;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.mod-btn:hover{background:rgba(255,255,255,.06);color:var(--text);border-color:var(--border2)}
.mod-btn svg{width:12px;height:12px;flex-shrink:0}
.mod-btn.active{color:var(--accent);border-color:rgba(124,106,255,.4);background:rgba(124,106,255,.08)}

<script>
// =============================================
// CONFIG — замени на свои ключи из supabase.com
// =============================================
const SUPABASE_URL = 'https://ejqdhcxubivyskyfnedk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_AGtrevUR0AQfOVp9S9hzCA_CiuLTaRg';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: {
    persistSession: true,         // сессия сохраняется в localStorage
    autoRefreshToken: true,
    storageKey: 'villagess-auth'
  }
});

const GAME_CENTER = [56.450279, 52.427013];
const GAME_BOUNDS = [[56.428, 52.395], [56.475, 52.462]];

const ROLES = {
  user:    { label: 'Игрок',     level: 0, cls: '' },
  helper:  { label: 'Хелпер',   level: 1, cls: 'role-helper' },
  mod:     { label: 'Модератор', level: 2, cls: 'role-mod' },
  admin:   { label: 'Администратор', level: 3, cls: 'role-admin' },
  curator: { label: 'Куратор',   level: 4, cls: 'role-curator' },
  zga:     { label: 'ЗГА',       level: 5, cls: 'role-zga' },
  ga:      { label: 'ГА',        level: 6, cls: 'role-ga' },
  coder:   { label: 'Кодер',     level: 99, cls: 'role-coder' },
};

const canMod     = r => (ROLES[r]?.level||0) >= 2;
const canAdmin   = r => (ROLES[r]?.level||0) >= 3;
const canRoles   = r => (ROLES[r]?.level||0) >= 5 || r==='coder';
const canCats    = r => (ROLES[r]?.level||0) >= 5 || r==='coder';
const canApprove = r => (ROLES[r]?.level||0) >= 3 || r==='coder';

function roleBadge(role) {
  const r = ROLES[role]; if(!r||!r.cls) return '';
  const shieldSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`;
  if(role==='coder') return `<span class="role-badge role-coder">${shieldSvg}<span>${r.label}</span></span>`;
  return `<span class="role-badge ${r.cls}">${shieldSvg}${r.label}</span>`;
}

// ── SVG helpers ──
const SVG = {
  user:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  map:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>`,
  pin:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
  chat:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  star:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  eye:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  team:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  trend:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
  camera: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`,
  check:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  x:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  trophy: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="8 21 12 17 16 21"/><line x1="12" y1="17" x2="12" y2="11"/><path d="M8 3H5v6c0 3.31 2.69 6 6 6s6-2.69 6-6V3h-3"/><path d="M5 3H2v4c0 2.21 1.34 4 3 4"/><path d="M19 3h3v4c0 2.21-1.34 4-3 4"/></svg>`,
  shield: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  edit:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  plus:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  smoke:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7a4 4 0 0 1-4-4 4 4 0 0 1 4-4h.5"/><path d="M17 20v-8a3 3 0 0 0-3-3"/><path d="M13 5a2 2 0 1 1 4 0v2a2 2 0 1 0 4 0"/></svg>`,
  disc:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/></svg>`,
  game:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/><circle cx="15" cy="13" r="1" fill="currentColor"/><circle cx="17" cy="11" r="1" fill="currentColor"/><path d="M6 4h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>`,
  logout: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
};

// =============================================
// STATE
// =============================================
let curUser = null, curProfile = null;

// =============================================
// AUTH
// =============================================
async function initAuth() {
  // Handle email confirmation redirect — Supabase puts code in URL
  const urlParams = new URLSearchParams(window.location.search);
  const hashParams = new URLSearchParams(window.location.hash.replace('#',''));
  const hasAuthCode = urlParams.has('code') || hashParams.has('access_token');

  if (hasAuthCode) {
    // Let Supabase exchange the code/token — getSession will trigger exchange
    await sb.auth.getSession();
    // Clean URL so it doesn't loop
    const cleanUrl = window.location.origin + window.location.pathname;
    window.history.replaceState({}, document.title, cleanUrl);
  }

  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) {
    curUser = session.user;
    const prof = await fetchProfile(curUser.id);
    // Profile might not exist yet if this is first login after email confirm
    if (!prof) {
      const meta = session.user.user_metadata || {};
      const uname = meta.username || ('user_' + curUser.id.slice(0,6));
      await sb.from('profiles').upsert({
        id: curUser.id, username: uname, role: 'user',
        avatar_emoji: '🎮', total_score: 0, best_score: 0, games_played: 0
      }, { onConflict: 'id' });
      await fetchProfile(curUser.id);
    }
  }

  sb.auth.onAuthStateChange(async (event, sess) => {
    if (sess?.user) {
      curUser = sess.user;
      const prof = await fetchProfile(curUser.id);
      if (!prof) {
        const meta = sess.user.user_metadata || {};
        const uname = meta.username || ('user_' + curUser.id.slice(0,6));
        await sb.from('profiles').upsert({
          id: curUser.id, username: uname, role: 'user',
          avatar_emoji: '🎮', total_score: 0, best_score: 0, games_played: 0
        }, { onConflict: 'id' });
        await fetchProfile(curUser.id);
      }
    } else {
      curUser = null; curProfile = null;
    }
    updateNavAuth();
    if (curPage === 'profile') renderProfile();
    if (curPage === 'forum') renderForum();
  });
  updateNavAuth();
}

async function fetchProfile(id) {
  const { data } = await sb.from('profiles').select('*').eq('id', id).single();
  curProfile = data; return data;
}

function updateNavAuth() {
  const el = document.getElementById('navAuth');
  if(curUser && curProfile) {
    el.innerHTML = `
      <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;cursor:pointer" onclick="showPage('profile')">
        ${curProfile.avatar_url
          ? `<img src="${curProfile.avatar_url}" style="width:100%;height:100%;object-fit:cover" />`
          : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`}
      </div>
      <span class="text-sm text-muted" style="max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(curProfile.username)}</span>
      ${roleBadge(curProfile.role)}
      <button class="btn-ghost btn-sm" onclick="doLogout()" title="Выйти">${SVG.logout}</button>
    `;
  } else {
    el.innerHTML = `
      <button class="btn-ghost btn-sm" onclick="openLogin()">Войти</button>
      <button class="btn-primary btn-sm" onclick="openRegister()">Регистрация</button>
    `;
  }
}

function openLogin() {
  openModal(`
    <h2 style="font-family:var(--font-d);font-size:21px;font-weight:800;margin-bottom:20px">Войти</h2>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="li-email" type="email" placeholder="you@example.com"/></div>
    <div class="form-group"><label class="form-label">Пароль</label><input class="form-input" id="li-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn-primary w-full" style="margin-top:4px" onclick="doLogin()">Войти</button>
    <p class="text-center text-muted text-sm mt-16">Нет аккаунта? <a href="#" onclick="openRegister()" style="color:var(--accent)">Зарегистрироваться</a></p>
  `);
  setTimeout(()=>document.getElementById('li-email')?.focus(),100);
}

function openRegister() {
  openModal(`
    <h2 style="font-family:var(--font-d);font-size:21px;font-weight:800;margin-bottom:20px">Создать аккаунт</h2>
    <div class="form-group"><label class="form-label">Никнейм</label><input class="form-input" id="rg-name" placeholder="coolplayer99"/></div>
    <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="rg-email" type="email" placeholder="you@example.com"/></div>
    <div class="form-group"><label class="form-label">Пароль</label><input class="form-input" id="rg-pass" type="password" placeholder="минимум 8 символов" onkeydown="if(event.key==='Enter')doRegister()"/></div>
    <button class="btn-primary w-full" style="margin-top:4px" onclick="doRegister()">Создать аккаунт</button>
    <p class="text-center text-muted text-sm mt-16">Уже есть? <a href="#" onclick="openLogin()" style="color:var(--accent)">Войти</a></p>
  `);
  setTimeout(()=>document.getElementById('rg-name')?.focus(),100);
}

async function doLogin() {
  const email = v('li-email'), pass = v('li-pass');
  if(!email||!pass) return toast('Заполни все поля','error');
  const { error } = await sb.auth.signInWithPassword({email,password:pass});
  if(error) return toast(error.message,'error');
  closeModal(); toast('Добро пожаловать!','success');
}

async function doRegister() {
  const uname = v('rg-name'), email = v('rg-email'), pass = v('rg-pass');
  if(!uname||!email||!pass) return toast('Заполни все поля','error');
  if(pass.length<8) return toast('Пароль минимум 8 символов','error');

  // Check username not taken
  const { data: existing } = await sb.from('profiles').select('id').eq('username', uname).maybeSingle();
  if(existing) return toast('Никнейм уже занят','error');

  const siteUrl = window.location.origin + window.location.pathname;
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: {
      emailRedirectTo: siteUrl,
      data: { username: uname }
    }
  });
  if(error) return toast(error.message,'error');

  // Create profile — works with or without email confirmation
  const uid = data?.user?.id;
  if(uid) {
    const { error: pe } = await sb.from('profiles').upsert({
      id: uid, username: uname, role: 'user',
      avatar_emoji: '🎮', total_score: 0, best_score: 0, games_played: 0
    }, { onConflict: 'id' });
    if(pe) console.warn('Profile upsert error:', pe.message);
  }

  closeModal();
  if(data?.session) {
    curUser = data.session.user;
    await fetchProfile(curUser.id);
    updateNavAuth();
    toast('Добро пожаловать, ' + uname + '!', 'success');
  } else {
    toast('Аккаунт создан! Проверь email и перейди по ссылке.', 'info');
  }
}

async function doLogout() {
  await sb.auth.signOut(); curUser=null; curProfile=null;
  updateNavAuth(); showPage('about'); toast('Вышел из аккаунта','info');
}

function selRounds(n, btn) {
  G.total = n;
  document.querySelectorAll('.round-opt').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

async function startGame() {
  const btn = document.querySelector('#gs-start .btn-primary');
  if(btn){btn.disabled=true;btn.textContent='Загрузка...';}
  try {
    const { data, error } = await sb.from('game_points').select('*').eq('approved',true);
    if(error) throw new Error(error.message);
    const available = data ? data.length : 0;
    if(available === 0) {
      toast('В базе нет ни одной точки. Добавь точки через раздел ниже.','error');
      if(btn){btn.disabled=false;btn.textContent='Начать игру';}
      return;
    }
    // Play with however many points exist (cap at requested rounds)
    const actualTotal = Math.min(G.total, available);
    if(actualTotal < G.total) toast(`Точек только ${available}, играем ${actualTotal} раундов`,'info');
    G.total = actualTotal;
    G.pts = data.sort(()=>Math.random()-.5).slice(0,G.total);
    G.round=1; G.score=0; G.results=[]; G.guess=null; G.marker=null;
    document.getElementById('gs-start').style.display='none';
    document.getElementById('gs-active').style.display='block';
    await initGuessMap();
    loadRound();
  } catch(e) {
    toast('Ошибка: '+e.message,'error');
    if(btn){btn.disabled=false;btn.textContent='Начать игру';}
  }
}

async function initGuessMap() {
  if(G.gmap){G.gmap.remove();G.gmap=null;}
  G.gmap = L.map('guess-map-div',{center:GAME_CENTER,zoom:14,zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(G.gmap);
  const bounds = L.latLngBounds(GAME_BOUNDS[0],GAME_BOUNDS[1]);
  G.gmap.setMaxBounds(bounds.pad(.4));
  G.gmap.on('click',e=>{
    G.guess=e.latlng;
    if(G.marker)G.marker.remove();
    G.marker=L.marker(e.latlng,{icon:L.divIcon({html:'<div style="width:14px;height:14px;background:var(--accent);border:2px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(124,106,255,.9)"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''})}).addTo(G.gmap);
    document.getElementById('g-coords').textContent=`${e.latlng.lat.toFixed(5)}, ${e.latlng.lng.toFixed(5)}`;
    document.getElementById('g-confirm').disabled=false;
  });
}

function loadRound() {
  G.cur = G.pts[G.round-1]; G.guess=null;
  if(G.marker){G.marker.remove();G.marker=null;}
  document.getElementById('g-confirm').disabled=true;
  document.getElementById('g-coords').textContent='Нажми на карту ↑';
  document.getElementById('g-round').textContent=G.round;
  document.getElementById('g-total').textContent=G.total;
  document.getElementById('g-score').textContent=G.score+' pts';
  document.getElementById('g-progress').style.width=((G.round-1)/G.total*100)+'%';
  const ph = document.getElementById('map-photo');
  if(G.cur.photo_url) ph.innerHTML=`<img src="${G.cur.photo_url}" alt="point"/>`;
  else ph.innerHTML=`<div class="no-photo-msg">${SVG.camera}<span>Фото не добавлено</span><span class="text-sm">${esc(G.cur.name)}</span></div>`;
  const hb = document.getElementById('hint-box');
  if(G.cur.hint){hb.textContent=G.cur.hint;hb.style.display='block';}
  else hb.style.display='none';
}

function confirmGuess() {
  if(!G.guess) return;
  const actual = L.latLng(G.cur.lat, G.cur.lng);
  const dist = Math.round(actual.distanceTo(G.guess));
  const pts = Math.max(0, Math.round(5000 - dist*10));
  G.score += pts; G.results.push({round:G.round,dist,score:pts});

  // Draw answer on map
  L.marker([actual.lat,actual.lng],{icon:L.divIcon({html:'<div style="width:14px;height:14px;background:#ff4f7a;border:2px solid #fff;border-radius:50%;box-shadow:0 0 10px rgba(255,79,122,.8)"></div>',iconSize:[14,14],iconAnchor:[7,7],className:''})}).addTo(G.gmap);
  L.polyline([G.guess,actual],{color:'#7c6aff',weight:2,dashArray:'5'}).addTo(G.gmap);
  document.getElementById('g-confirm').disabled=true;
  document.getElementById('g-score').textContent=G.score+' pts';

  // Show inline result overlay (avoids Leaflet z-index conflict with modal)
  const label = dist<50?'Точное попадание!':dist<200?'Отлично!':dist<500?'Неплохо':'Промах';
  const accent = dist<50?'#00e5a0':dist<200?'#7c6aff':dist<500?'#ff9f43':'#ff4f7a';
  const bar = document.getElementById('g-round-result');
  if(bar) {
    bar.style.display='flex';
    bar.innerHTML=`
      <div style="display:flex;align-items:center;gap:14px;flex:1;flex-wrap:wrap">
        <div style="font-size:28px;line-height:1">${dist<50?'🎯':dist<200?'🔥':dist<500?'👌':'😬'}</div>
        <div>
          <div style="font-family:var(--font-d);font-size:20px;font-weight:800;color:${accent}">+${pts} очков</div>
          <div style="font-size:12px;color:var(--muted)">${label} · ${dist} м от цели</div>
        </div>
      </div>
      <button class="btn-primary" onclick="nextRound()" style="flex-shrink:0;padding:9px 20px">
        ${G.round<G.total?'Следующий раунд →':'Результаты'}
      </button>
    `;
  }
}

function nextRound() {
  closeModal();
  const bar = document.getElementById('g-round-result');
  if(bar) bar.style.display='none';
  if(G.round>=G.total){showFinalResults();return;}
  G.round++; loadRound();
}

async function showFinalResults() {
  document.getElementById('gs-active').style.display='none';
  if(curUser && curProfile) {
    await sb.from('game_scores').insert({user_id:curUser.id,score:G.score,rounds:G.total,created_at:new Date().toISOString()});
    const newTotal=(curProfile.total_score||0)+G.score, newGames=(curProfile.games_played||0)+1, newBest=Math.max(curProfile.best_score||0,G.score);
    await sb.from('profiles').update({total_score:newTotal,games_played:newGames,best_score:newBest}).eq('id',curUser.id);
    curProfile={...curProfile,total_score:newTotal,games_played:newGames,best_score:newBest};
  }
  document.getElementById('gs-result').style.display='block';
  document.getElementById('gs-result').innerHTML=`
    <div class="game-result-screen">
      <div class="card" style="text-align:center;padding:40px 32px">
        <div style="width:64px;height:64px;background:rgba(124,106,255,.1);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">${SVG.trophy}</div>

        <div style="background:var(--bg3);border-radius:var(--radius-sm);padding:14px;margin-bottom:22px;text-align:left">
          ${G.results.map(r=>`
            <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px">
              <span class="text-muted">Раунд ${r.round}</span><span>${r.dist} м</span><span style="color:var(--accent);font-weight:600">+${r.score}</span>

        </div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">

          <button class="btn-ghost" onclick="showPage('top')">Топ игроков</button>

}

function playAgain() {
  document.getElementById('gs-result').style.display='none';
  document.getElementById('gs-start').style.display='block';
  if(G.gmap){G.gmap.remove();G.gmap=null;}
}

function endGame() {
  if(!confirm('Закончить игру?'))return;
  document.getElementById('gs-active').style.display='none';
  document.getElementById('gs-start').style.display='block';
  if(G.gmap){G.gmap.remove();G.gmap=null;}
}

      <div class="form-group"><label class="form-label">Долгота</label><input class="form-input" id="sp-lng" type="number" step="0.000001" placeholder="52.427..."/></div>

async function submitSuggest() {
  const name=v('sp-n'),lat=parseFloat(v('sp-lat')),lng=parseFloat(v('sp-lng')),hint=v('sp-h'),photo=v('sp-p');
  if(!name||isNaN(lat)||isNaN(lng))return toast('Заполни обязательные поля','error');
  const {error}=await sb.from('game_points').insert({name,lat,lng,hint:hint||null,photo_url:photo||null,approved:false,submitted_by:curUser.id,created_at:new Date().toISOString()});
  if(error)return toast('Ошибка: '+error.message,'error');
  closeModal(); toast('Точка отправлена на проверку!','success');
}

async function loadPending() {
  const {data}=await sb.from('game_points').select('*,profiles(username)').eq('approved',false);
  const el=document.getElementById('pending-wrap'); if(!el)return;
  if(!data||!data.length){el.innerHTML='<p class="text-muted text-sm">Нет точек на проверке</p>';return;}
  el.innerHTML=`<p class="text-sm text-muted" style="margin-bottom:10px">Точки на проверке (видно модераторам)</p>`+
    data.map(p=>`<div class="pending-item">
      <div class="pending-info"><div class="pending-name">${esc(p.name)}</div><div class="pending-meta">${p.lat}, ${p.lng} · от ${p.profiles?.username||'?'}</div></div>
      <div class="pending-actions">
        <button class="btn-green btn-sm" onclick="approvePoint('${p.id}')">${SVG.check}</button>
        <button class="btn-danger btn-sm" onclick="rejectPoint('${p.id}')">${SVG.x}</button>
      </div>
    </div>`).join('');
}

async function approvePoint(id) {
  await sb.from('game_points').update({approved:true}).eq('id',id);
  toast('Точка принята','success'); loadPending();
}
async function rejectPoint(id) {
  await sb.from('game_points').delete().eq('id',id);
  toast('Точка удалена','info'); loadPending();
}

    <div style="width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px"></div>
    <div style="font-size:12px;color:var(--muted)">Загрузка форума...</div>
  </div>`;

  let data = null;
  try {
    const res = await fetchWithTimeout(
      sb.from('forum_categories').select('*').order('created_at').then(r=>r),
      10000
    );
    data = res?.data || null;
  } catch(e) {
    console.warn('loadCats error:', e.message);
    // Show error with retry
    if(body) body.innerHTML = `<div style="text-align:center;padding:60px 24px">
      <div style="margin-bottom:12px;opacity:.5"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#ff9f43" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>

    </div>`;
    return;
  }

  if(!data || !data.length) {
    // Try to seed default categories
    try {
      await sb.from('forum_categories').insert(
        DEFAULT_CATS.map(cc=>({id:cc.id, name:cc.name, description:cc.description||''}))
      );
    } catch(e) { /* ignore duplicate errors */ }
    // Re-fetch
    try {
      const res2 = await sb.from('forum_categories').select('*').order('created_at');
      data = res2?.data || DEFAULT_CATS;
    } catch(e) { data = DEFAULT_CATS; }
  }

  F.cats = data || DEFAULT_CATS;
  showForumIndex();
}

function renderPost(p,isOP) {
  const pr=p.profiles||{};
  const postContent = isOP ? (p.body||p.content||'') : (p.content||'');
  const avContent = pr.avatar_url
    ? `<img src="${pr.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" onerror="this.parentElement.innerHTML='${SVG.user.replace(/'/g,"\'")}'"/>`
    : SVG.user;
  // Format post body: handle section headers (===), separators (───), and role badge tokens
  function formatPostBody(txt) {
    if(!txt) return '';
    const lines = txt.split('\n');
    let html = '';
    for(const line of lines) {
      const esc_line = esc(line);
      if(line.startsWith('=== ') && line.endsWith(' ===')) {
        const title = esc(line.slice(4,-4));
        html += `<div style="font-family:var(--font-d);font-size:17px;font-weight:800;color:var(--text);margin:20px 0 8px;letter-spacing:-.3px">${title}</div>`;
      } else if(line.startsWith('─')) {
        html += `<div style="height:1px;background:var(--border);margin:12px 0"></div>`;
      } else if(line === '') {
        html += `<div style="height:6px"></div>`;
      } else if(/^ХЕЛПЕР|^МОДЕРАТОР|^АДМИНИСТРАТОР|^КУРАТОР|^ЗГА|^ГА |^КОДЕР/.test(line)) {
        // Role line — show badge + description
        const dashIdx = line.indexOf(' — ');
        const roleName = dashIdx>0 ? line.slice(0,dashIdx) : line;
        const desc = dashIdx>0 ? esc(line.slice(dashIdx+3)) : '';
        const roleKey = {
          'ХЕЛПЕР':'helper','МОДЕРАТОР':'mod','АДМИНИСТРАТОР':'admin',
          'КУРАТОР':'curator','ЗГА':'zga','ГА':'ga','КОДЕР':'coder'
        }[roleName.trim()] || '';
        const badge = roleKey ? roleBadge(roleKey) : `<strong>${esc(roleName)}</strong>`;
        html += `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;flex-wrap:wrap">${badge}${desc?`<span style="font-size:13px;color:var(--muted)">${desc}</span>`:''}</div>`;
      } else {
        html += `<div style="font-size:13.5px;line-height:1.7;color:rgba(240,240,245,.85)">${esc_line}</div>`;
      }
    }
    return html;
  }

  const bodyHtml = postContent.includes('=== ') ? formatPostBody(postContent) : `<div style="white-space:pre-wrap;font-size:14px;line-height:1.75;color:rgba(240,240,245,.88)">${esc(postContent)}</div>`;

  return `<div class="post-item${isOP?' post-op':''}">
    <div class="post-author">
      <div class="post-av" style="${pr.avatar_url?'background:none;box-shadow:none;overflow:hidden':''}">${avContent}</div>
      <div class="post-uname">${esc(pr.username||'Аноним')}</div>
      ${roleBadge(pr.role)}
      ${isOP?`<div style="margin-top:8px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600">Автор</div>`:''}
    </div>
    <div class="post-content">
      <div class="post-body">${bodyHtml}</div>
      <div class="post-footer">
        <div class="post-date">${timeAgo(p.created_at)}</div>
        ${canMod(curProfile?.role)&&!isOP?`<button class="btn-danger btn-sm" onclick="delPost('${p.id}')">Удалить</button>`:''}
      </div>
    </div>
  </div>`;
}

async function doReply(safeId) {

  const realTid = window._currentThreadId || safeId;

  const el = document.getElementById('reply-input-'+safeId);
  const txt = el ? el.value.trim() : '';
  if(!txt) return toast('Напиши что-нибудь','error');

  // Ensure profile exists (FK guard)
  if(!curProfile) {
    await sb.from('profiles').upsert({
      id:curUser.id,
      username: curUser.user_metadata?.username || ('user_'+curUser.id.slice(0,6)),
      role:'user', avatar_emoji:'🎮', total_score:0, best_score:0, games_played:0
    },{onConflict:'id'});
    await fetchProfile(curUser.id);
  }

  const btn = document.getElementById('reply-btn-'+safeId);
  if(btn){btn.disabled=true;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Отправка...';}

  const {data: postData, error} = await sb.from('forum_posts').insert({
    thread_id: realTid,
    user_id: curUser.id,
    content: txt,
    created_at: new Date().toISOString()
  }).select();

  if(error){
    if(btn){btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Отправить';}
    return toast('Ошибка: '+error.message,'error');
  }

  setTimeout(()=> sb.rpc('increment_reply_count',{thread_id:realTid}).catch(()=>{}), 0);
  toast('Ответ добавлен','success');
  openThread(realTid);
}

async function renderTop() {
  document.getElementById('page-top').innerHTML=`

function switchTop(mode,btn) {
  topMode=mode;
  document.querySelectorAll('.top-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); loadTop();
}

async function loadTop() {
  const {data}=await sb.from('profiles').select('id,username,role,best_score,total_score,games_played').not('games_played','eq',0).order('best_score',{ascending:false}).limit(50);
  const el=document.getElementById('top-body'); if(!el)return;
  if(!data||!data.length){el.innerHTML=`<div class="empty-state">${SVG.trophy}<p>Пока никто не играл. Будь первым!</p></div>`;return;}
  let list=[...data];
  if(topMode==='avg') list.sort((a,b)=>((b.total_score||0)/(b.games_played||1))-((a.total_score||0)/(a.games_played||1)));
  else if(topMode==='games') list.sort((a,b)=>(b.games_played||0)-(a.games_played||0));
  const rk=(i)=>i===0?'gold':i===1?'silver':i===2?'bronze':'';
  const rkn=(i)=>i===0?'🥇':i===1?'🥈':i===2?'🥉':String(i+1);
  const sc=(p)=>topMode==='avg'?Math.round((p.total_score||0)/(p.games_played||1))+' avg':topMode==='games'?p.games_played+' игр':(p.best_score||0)+' pts';
  el.innerHTML=`<div class="top-list">`+list.map((p,i)=>`
    <div class="top-item ${i<3?'r'+(i+1):''}">
      <div class="top-rank ${rk(i)}">${rkn(i)}</div>
      <div class="top-av">${SVG.user}</div>
      <div class="top-name">${esc(p.username)} ${roleBadge(p.role)}</div>
      <div style="text-align:right">
        <div class="top-sc">${sc(p)}</div>
        <div class="top-gm">${p.games_played} игр</div>
      </div>
    </div>`).join('')+`</div>`;
}

  if(!target)return toast('Пользователь не найден','error');
  const myLvl=ROLES[curProfile.role]?.level||0, tgtLvl=ROLES[target.role]?.level||0, newLvl=ROLES[role]?.level||0;
  if(curProfile.role!=='coder'&&newLvl>=myLvl)return toast('Нельзя выдать роль ≥ своей','error');
  if(curProfile.role!=='coder'&&tgtLvl>=myLvl)return toast('Нельзя изменить роль равного','error');
  await sb.from('profiles').update({role}).eq('id',target.id);
  toast(`Роль ${ROLES[role].label} выдана ${uname}`,'success');
}

async function uploadAvatar(event) {
  const file = event.target.files[0];
  if(!file) return;
  if(file.size > 2*1024*1024) return toast('Файл больше 2MB','error');
  if(!file.type.startsWith('image/')) return toast('Только изображения','error');

  const prog = document.getElementById('avatar-upload-progress');
  const bar = document.getElementById('avatar-prog-bar');
  if(prog) prog.style.display='block';
  if(bar) bar.style.width='20%';

  try {
    const ext = file.name.split('.').pop().toLowerCase();
    const path = `avatars/${curUser.id}.${ext}`;

    if(bar) bar.style.width='40%';

    const { error: upErr } = await sb.storage
      .from('avatars')
      .upload(path, file, { upsert: true, contentType: file.type });

    if(upErr) throw new Error(upErr.message);
    if(bar) bar.style.width='70%';

    const { data: urlData } = sb.storage.from('avatars').getPublicUrl(path);
    const avatarUrl = urlData.publicUrl + '?t=' + Date.now();

    if(bar) bar.style.width='85%';

    await sb.from('profiles').update({ avatar_url: avatarUrl }).eq('id', curUser.id);
    curProfile.avatar_url = avatarUrl;

    if(bar) bar.style.width='100%';

    // Update preview
    const preview = document.getElementById('avatar-preview');
    if(preview) preview.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover"/>`;

    // Update nav avatar
    updateNavAuth();
    toast('Аватар обновлён!','success');
  } catch(e) {
    toast('Ошибка загрузки: '+e.message,'error');
  } finally {
    setTimeout(()=>{ if(prog)prog.style.display='none'; if(bar)bar.style.width='0%'; }, 1200);
  }
}

function openEditProfile() {
  openModal(`
    <h2 style="font-family:var(--font-d);font-size:20px;font-weight:800;margin-bottom:18px">Редактировать профиль</h2>
    <div class="form-group"><label class="form-label">Никнейм</label><input class="form-input" id="ep-name" value="${esc(curProfile.username||'')}"/></div>
    <button class="btn-primary w-full" style="margin-top:4px" onclick="saveProfile()">Сохранить</button>
  `);
}

async function saveProfile() {
  const uname=v('ep-name'); if(!uname)return toast('Никнейм не может быть пустым','error');
  const {error}=await sb.from('profiles').update({username:uname}).eq('id',curUser.id);
  if(error)return toast('Ошибка: '+error.message,'error');
  curProfile.username=uname; closeModal(); updateNavAuth(); renderProfile(); toast('Профиль обновлён','success');
}

// =============================================
// CORE: ROUTING / MODAL / TOAST / UTILS
// =============================================
let curPage='about';
const PAGES={about:renderAbout,game:renderGame,forum:renderForum,top:renderTop,profile:renderProfile};

function showPage(name) {
  if(!PAGES[name])return;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name)?.classList.add('active');
  document.querySelector(`.nav-btn[data-page="${name}"]`)?.classList.add('active');
  curPage=name; PAGES[name](); window.scrollTo(0,0);
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-content').innerHTML='';
}

function toast(msg,type='info') {
  const el=document.createElement('div');
  el.className=`toast ${type}`;
  const icons={success:SVG.check,error:SVG.x,info:SVG.star};
  el.innerHTML=`<span style="flex-shrink:0;opacity:.7;display:flex">${icons[type]||''}</span><span>${msg}</span>`;
  el.querySelector('svg').style.cssText='width:14px;height:14px';
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}

function v(id){const el=document.getElementById(id);return el?(el.value||'').trim():'';}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function timeAgo(iso){
  if(!iso)return '';
  const d=new Date(iso),diff=(Date.now()-d)/1000;
  if(diff<60)return 'только что';
  if(diff<3600)return Math.floor(diff/60)+' мин назад';
  if(diff<86400)return Math.floor(diff/3600)+' ч назад';
  return d.toLocaleDateString('ru-RU');
}

// close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});

// nav buttons
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>showPage(btn.dataset.page));
});

// ── BOOT ──
(async()=>{
  await initAuth();
  // If URL has auth code — user came from email confirm link, go to profile
  const urlParams = new URLSearchParams(window.location.search);
  const wasRedirect = urlParams.has('code') || document.referrer.includes('supabase');
  showPage(wasRedirect && curUser ? 'profile' : 'about');
})();
</script>
